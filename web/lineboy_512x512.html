<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lineboy - 512x512 Full Resolution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            color: #4a9;
            margin: 0 0 20px 0;
            font-size: 24px;
        }
        #gameCanvas {
            display: block;
            border: 3px solid #4a9;
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;
            height: auto;
            margin: 0 0 20px 0;
            max-width: 512px;
        }
        .info {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 14px;
        }
        .status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
            font-size: 12px;
        }
        .status-item {
            background: #111;
            padding: 8px;
            border-radius: 3px;
        }
        .label { color: #999; }
        .ok { color: #4a9; }
        .error { color: #f44; }
        .warn { color: #fa0; }
        button {
            background: #4a9;
            color: #000;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            font-family: monospace;
        }
        button:hover {
            background: #5bc;
        }
        button:active {
            background: #3a8;
        }
        .button-group {
            margin: 20px 0;
        }
        .dpad {
            display: inline-grid;
            grid-template-columns: repeat(3, 60px);
            gap: 5px;
            margin: 10px 0;
        }
        .dpad button {
            padding: 10px 15px;
            font-size: 14px;
        }
        .empty {
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Lineboy - 512×512 Full Resolution</h1>
        
        <canvas id="gameCanvas" width="512" height="512"></canvas>
        
        <div class="info">
            <div class="status">
                <div class="status-item">
                    <span class="label">WASM:</span>
                    <span id="s-wasm" class="warn">Loading...</span>
                </div>
                <div class="status-item">
                    <span class="label">Game:</span>
                    <span id="s-game" class="warn">No</span>
                </div>
                <div class="status-item">
                    <span class="label">FPS:</span>
                    <span id="s-fps" class="ok">0</span>
                </div>
                <div class="status-item">
                    <span class="label">Error:</span>
                    <span id="s-err" class="ok">None</span>
                </div>
            </div>
        </div>

        <div class="button-group">
            <strong>移動操作:</strong>
            <div class="dpad">
                <button class="empty"></button>
                <button onclick="window.gameController.up()">↑</button>
                <button class="empty"></button>
                
                <button onclick="window.gameController.left()">← Left</button>
                <button onclick="window.gameController.down()">↓</button>
                <button onclick="window.gameController.right()">Right →</button>
            </div>
        </div>

        <div class="button-group">
            <strong>アクション:</strong><br>
            <button onclick="window.gameController.jump()" style="padding: 15px 50px; font-size: 18px;">🎮 JUMP (Space)</button>
            <button onclick="window.gameController.reset()" style="background: #f66; margin-left: 20px;">🔄 RESET (R)</button>
        </div>

        <div style="font-size: 12px; color: #999; margin-top: 20px;">
            キーボード: 矢印キー (移動) | スペース (ジャンプ) | R (リセット)
        </div>
    </div>

    <script type="module">
        let wasmModule = null;
        let canvas = null;
        let ctx = null;
        let gameRunning = false;
        let frameCount = 0;
        let lastFpsTime = Date.now();
        let fps = 0;

        // キー押下状態
        let keysPressed = {
            left: false,
            right: false,
            jump: false,
        };

        const palette = [
            [0, 0, 0],           // 0: Black
            [29, 43, 83],        // 1: Navy
            [126, 37, 83],       // 2: Purple
            [0, 135, 81],        // 3: Green
            [171, 82, 54],       // 4: Brown
            [95, 87, 79],        // 5: Dark Gray
            [194, 195, 199],     // 6: Light Gray
            [255, 241, 232],     // 7: White
            [255, 0, 77],        // 8: Red
            [255, 163, 0],       // 9: Orange
            [255, 236, 39],      // 10: Yellow
            [0, 228, 54],        // 11: Lime
            [41, 173, 255],      // 12: Cyan
            [131, 118, 156],     // 13: Gray
            [255, 119, 168],     // 14: Pink
            [255, 204, 170],     // 15: Peach
        ];

        const updateStatus = (id, text, cls = 'ok') => {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = text;
                el.className = cls;
            }
        };

        // ゲームコントローラー API
        window.gameController = {
            left: () => { keysPressed.left = true; setTimeout(() => { keysPressed.left = false; }, 50); },
            right: () => { keysPressed.right = true; setTimeout(() => { keysPressed.right = false; }, 50); },
            jump: () => { keysPressed.jump = true; setTimeout(() => { keysPressed.jump = false; }, 50); },
            reset: () => { wasmModule.reset(); },
            up: () => {},
            down: () => {},
        };

        try {
            console.log('=== Lineboy 512×512 Init ===\n');

            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            console.log('Loading WASM module...');
            wasmModule = await import('./lineboy/lineboy.js');
            console.log('✓ Module loaded');
            updateStatus('s-wasm', 'Loaded', 'ok');

            console.log('Initializing WASM...');
            await wasmModule.default();
            console.log('✓ WASM initialized');

            console.log('Calling init()...');
            wasmModule.init();
            console.log('✓ Game initialized');
            updateStatus('s-game', 'Ready', 'ok');
            gameRunning = true;

            // Game loop
            const gameLoop = () => {
                try {
                    // Update with current key states
                    wasmModule.update(keysPressed.left, keysPressed.right, keysPressed.jump);

                    // Render
                    const pixelData = wasmModule.render();
                    frameCount++;

                    // FPS
                    const now = Date.now();
                    if (now - lastFpsTime > 1000) {
                        fps = frameCount;
                        frameCount = 0;
                        lastFpsTime = now;
                        updateStatus('s-fps', fps.toString(), 'ok');
                    }

                    // Draw
                    const imageData = ctx.createImageData(512, 512);
                    const data = imageData.data;
                    for (let i = 0; i < pixelData.length; i++) {
                        const rgb = palette[pixelData[i] % 16];
                        const idx = i * 4;
                        data[idx] = rgb[0];
                        data[idx + 1] = rgb[1];
                        data[idx + 2] = rgb[2];
                        data[idx + 3] = 255;
                    }
                    ctx.putImageData(imageData, 0, 0);

                } catch (err) {
                    updateStatus('s-err', err.message, 'error');
                    console.error('Game loop error:', err);
                    return;
                }

                requestAnimationFrame(gameLoop);
            };

            gameLoop();

            // Keyboard
            document.addEventListener('keydown', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'arrowleft') keysPressed.left = true;
                if (key === 'arrowright') keysPressed.right = true;
                if (key === ' ') {
                    e.preventDefault();
                    keysPressed.jump = true;
                }
                if (key === 'r') wasmModule.reset();
            });

            document.addEventListener('keyup', (e) => {
                const key = e.key.toLowerCase();
                if (key === 'arrowleft') keysPressed.left = false;
                if (key === 'arrowright') keysPressed.right = false;
                if (key === ' ') keysPressed.jump = false;
            });

            console.log('✅ Game ready. Use buttons or keyboard to play.');

        } catch (err) {
            console.error('Fatal error:', err);
            updateStatus('s-err', err.message, 'error');
        }
    </script>
</body>
</html>
