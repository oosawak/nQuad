<!DOCTYPE html>
<html>
<head>
    <title>Cubeboy Minimal Test</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: #0f0; font-family: monospace; }
        canvas { border: 2px solid #0f0; display: block; image-rendering: pixelated; width: 512px; height: 512px; }
        #log { white-space: pre; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Cubeboy Minimal</h1>
    <canvas id="canvas" width="128" height="128"></canvas>
    <div id="fps">FPS: 0</div>
    <pre id="log"></pre>
    
    <script type="module">
        const log = (msg) => {
            console.log(msg);
            document.getElementById('log').textContent += msg + '\n';
        };

        import init, * as wasm from './cubeboy/cubeboy.js';
        
        (async () => {
            try {
                log('[1] Loading WASM...');
                await init();
                log('[2] WASM loaded');
                
                log('[3] Calling init()...');
                wasm.init();
                log('[4] init() done');
                
                log('[5] Getting framebuffer ptr...');
                const fbPtr = wasm.get_framebuffer();
                log(`[6] FB ptr = ${fbPtr} (0x${fbPtr.toString(16)})`);
                
                log('[7] Getting WASM memory...');
                const memory = wasm.memory;
                log(`[8] Memory buffer size = ${memory.buffer.byteLength}`);
                
                // Try different memory access methods
                log('[9] Creating memory view...');
                const fbU8 = new Uint8Array(memory.buffer, fbPtr, 128*128*4);
                log(`[10] U8 view created, first 16 bytes: ${Array.from(fbU8.slice(0,16)).map(b => b.toString(16).padStart(2,'0')).join(' ')}`);
                
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                
                log('[11] Rendering frame...');
                wasm.render();
                
                log('[12] Reading framebuffer to canvas...');
                const imgData = ctx.createImageData(128, 128);
                const data = imgData.data;
                
                // Copy bytes directly
                for (let i = 0; i < 128*128; i++) {
                    const off = i * 4;
                    data[off + 0] = fbU8[off + 2];  // B
                    data[off + 1] = fbU8[off + 1];  // G
                    data[off + 2] = fbU8[off + 0];  // R
                    data[off + 3] = 0xFF;
                }
                ctx.putImageData(imgData, 0, 0);
                log('[13] Canvas drawn');
                
                // Start game loop
                let frame = 0;
                const loop = () => {
                    wasm.update(0, 0, 0);
                    wasm.render();
                    
                    const imgData = ctx.createImageData(128, 128);
                    const data = imgData.data;
                    for (let i = 0; i < 128*128; i++) {
                        const off = i * 4;
                        data[off + 0] = fbU8[off + 2];
                        data[off + 1] = fbU8[off + 1];
                        data[off + 2] = fbU8[off + 0];
                        data[off + 3] = 0xFF;
                    }
                    ctx.putImageData(imgData, 0, 0);
                    
                    frame++;
                    if (frame % 60 === 0) {
                        document.getElementById('fps').textContent = `Frame: ${frame}`;
                    }
                    requestAnimationFrame(loop);
                };
                loop();
                
            } catch (err) {
                log(`ERROR: ${err.message}`);
                log(err.stack);
            }
        })();
    </script>
</body>
</html>
