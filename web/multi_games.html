<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nantaraquad - Multi Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Courier New', monospace;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #00ff00;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff00;
            margin-bottom: 10px;
        }
        
        .game-selector {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .game-btn {
            padding: 15px 30px;
            background-color: #333;
            color: #fff;
            border: 2px solid #00ff00;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .game-btn:hover {
            background-color: #00ff00;
            color: #000;
            transform: scale(1.05);
        }
        
        .game-btn.active {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }
        
        .game-container {
            background: #000;
            border: 3px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border: 2px solid #00ff00;
            image-rendering: pixelated;
            width: 100%;
            height: auto;
            max-width: 512px;
        }
        
        .game-info {
            margin-top: 20px;
            text-align: center;
            color: #ffff00;
            font-size: 14px;
        }
        
        .controls-info {
            margin-top: 15px;
            padding: 15px;
            background: #222;
            border-left: 3px solid #00ff00;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
        }
        
        #status {
            color: #ffff00;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .error {
            color: #ff3333;
            padding: 15px;
            background: #1a0000;
            border-left: 3px solid #ff3333;
            margin-top: 15px;
        }
        
        footer {
            margin-top: 30px;
            color: #888;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .game-btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 NANTARAQUAD GAMES 🎮</h1>
        <p style="color: #00ff00;">Retro Games on WASM</p>
    </header>
    
    <div class="game-selector">
        <button class="game-btn active" onclick="selectGame('lineboy', event)">🏃 Lineboy</button>
        <button class="game-btn" onclick="selectGame('cubeboy', event)">🎮 Cubeboy</button>
        <button class="game-btn" onclick="selectGame('mariokart', event)">🏎️ Mario Kart</button>
        <button class="game-btn" onclick="selectGame('mario64', event)">⭐ Mario 64</button>
    </div>
    
    <div class="game-container">
        <canvas id="canvas" width="512" height="512"></canvas>
        <div id="status">Lineboy を読み込み中...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div class="game-info">
            <p id="game-title">🏃 Lineboy</p>
            <p id="game-desc">Jump and dodge enemies through five themed worlds</p>
        </div>
        
        <div class="controls-info">
            <strong>操作方法:</strong><br>
            <span id="controls-text">⬅️➡️: 移動 | Space: ジャンプ</span>
        </div>
    </div>
    
    <footer>
        Powered by Rust + WASM | Nantaraquad Engine
    </footer>
    
    <script type="module">
        const games = {
            lineboy: {
                title: '🏃 Lineboy',
                desc: 'Jump and dodge enemies through five themed worlds',
                controls: '⬅️➡️: 移動 | Space: ジャンプ'
            },
            cubeboy: {
                title: '🎮 Cubeboy',
                desc: 'Precision platformer with coyote time, wall slide, and dash',
                controls: '⬅️➡️: 移動 | Space: ジャンプ | E: ダッシュ'
            },
            mariokart: {
                title: '🏎️ Mario Kart',
                desc: 'Top-down racing with drifting and lap tracking',
                controls: '⬅️➡️⬆️⬇️: 操作 | Space: ドリフト'
            },
            mario64: {
                title: '⭐ Mario 64',
                desc: '3D isometric platformer with jumping and camera control',
                controls: '⬅️➡️⬆️⬇️: 移動 | Space: ジャンプ | A/D: カメラ回転'
            }
        };
        
        let wasmModule = null;
        let currentGame = 'lineboy';
        
        // WASM モジュール読み込み
        async function loadWasmModule() {
            try {
                // キャッシュバスターを追加
                const timestamp = new Date().getTime();
                const response = await fetch(`./nantaraquad.js?v=${timestamp}`);
                if (!response.ok) throw new Error(`Failed to fetch WASM module (HTTP ${response.status})`);
                
                const text = await response.text();
                const blob = new Blob([text], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                
                const module = await import(url);
                console.log('✅ WASM module loaded:', module);
                return module;
            } catch (e) {
                console.error('❌ WASM Loading Error:', e);
                throw e;
            }
        }
        
        // ゲーム選択
        async function selectGame(gameName, event) {
            event.preventDefault();
            
            if (gameName === currentGame && wasmModule) {
                console.log('Game already running');
                return;
            }
            
            currentGame = gameName;
            const gameInfo = games[gameName];
            
            // UI 更新
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            document.getElementById('game-title').textContent = gameInfo.title;
            document.getElementById('game-desc').textContent = gameInfo.desc;
            document.getElementById('controls-text').textContent = gameInfo.controls;
            document.getElementById('status').textContent = `⏳ ${gameInfo.title} を読み込み中...`;
            document.getElementById('error').style.display = 'none';
            
            try {
                // WASM モジュール初期化
                if (!wasmModule) {
                    wasmModule = await loadWasmModule();
                }
                
                document.getElementById('status').textContent = `✅ ${gameInfo.title} 実行中！`;
                console.log('✅ Game loaded successfully:', gameName);
                
            } catch (error) {
                console.error('Game load error:', error);
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `エラー: ${error.message}`;
                document.getElementById('status').textContent = `❌ ${gameInfo.title} 読み込み失敗`;
            }
        }
        
        // グローバルに公開
        window.selectGame = selectGame;
        
        // 初期化
        console.log('🎮 Nantaraquad Multi-Game Loader Initialized');
        console.log('Available games:', Object.keys(games));
        
        // ページロード時に WASM を事前読み込み
        window.addEventListener('load', async () => {
            try {
                console.log('🔄 Preloading WASM module...');
                if (!wasmModule) {
                    wasmModule = await loadWasmModule();
                    console.log('✅ WASM module preloaded');
                }
            } catch (e) {
                console.warn('⚠️  WASM preload warning:', e.message);
                // 初回選択時に読み込むので失敗しても大丈夫
            }
        });
    </script>
</body>
</html>
