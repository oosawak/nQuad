<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nQuad - All Demos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #0f0;
            overflow-x: hidden;
        }

        .header {
            background: #0a0a0a;
            border-bottom: 2px solid #0f0;
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .container {
            display: flex;
            height: calc(100vh - 80px);
        }

        .sidebar {
            width: 250px;
            background: #0a0a0a;
            border-right: 2px solid #0f0;
            overflow-y: auto;
            padding: 10px;
        }

        .demo-list {
            list-style: none;
        }

        .demo-list li {
            margin: 5px 0;
            padding: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .demo-list li:hover {
            background: #1a3a1a;
            border: 1px solid #0f0;
        }

        .demo-list li.active {
            background: #0f0;
            color: #000;
            font-weight: bold;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .demo-frame {
            display: none;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .demo-frame.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #canvas {
            border: 2px solid #0f0;
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 90vmin;
            max-height: 90vmin;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #0f0;
            max-width: 600px;
            font-size: 12px;
        }

        .controls {
            margin-top: 10px;
            padding: 10px;
            background: #0a0a0a;
            border: 1px solid #0f0;
            border-radius: 4px;
            text-align: center;
        }

        .info-text {
            color: #0f0;
            font-size: 13px;
            margin: 10px;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 nQuad - Demo Gallery</h1>
        <p style="font-size: 12px; color: #666;">All WASM demos in one place</p>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3 style="margin-bottom: 10px; border-bottom: 1px solid #0f0; padding-bottom: 5px;">Demos</h3>
            <ul class="demo-list" id="demoList">
                <!-- Demos will be inserted here by JS -->
            </ul>
        </div>

        <div class="content">
            <div id="demoContainer">
                <div class="info-text">
                    Select a demo from the sidebar to get started
                </div>
            </div>
        </div>
    </div>

    <script>
        const demos = [
            {
                id: 'cubeboy-3d',
                name: '🎲 3D Cube',
                category: '3D Graphics',
                description: 'Rotating 3D cube with keyboard controls',
                type: 'cubeboy-3d'
            },
            {
                id: 'cubeboy-nquad',
                name: '🎲 Cubeboy (nQuad)',
                category: '3D Graphics',
                description: '3D demo using nQuad API',
                type: 'cubeboy-nquad'
            },
            {
                id: 'lineboy',
                name: '🏃 Lineboy',
                category: 'Games',
                description: 'Platformer with jumping mechanics - Use Arrow keys or WASD + Space to jump',
                type: 'lineboy'
            }
        ];

        let currentDemo = null;
        let gameRunning = false;

        function renderDemoList() {
            const list = document.getElementById('demoList');
            let currentCategory = '';
            
            demos.forEach(demo => {
                if (demo.category !== currentCategory) {
                    currentCategory = demo.category;
                    const catDiv = document.createElement('div');
                    catDiv.className = 'demo-category';
                    catDiv.textContent = currentCategory;
                    list.appendChild(catDiv);
                }

                const li = document.createElement('li');
                li.textContent = demo.name;
                li.onclick = () => loadDemo(demo.id);
                li.id = `demo-${demo.id}`;
                list.appendChild(li);
            });
        }

        function clearContent() {
            const container = document.getElementById('demoContainer');
            container.innerHTML = '';
            gameRunning = false;
        }

        async function loadDemo(demoId) {
            const demo = demos.find(d => d.id === demoId);
            if (!demo || demo.id === currentDemo) return;

            // Update UI
            document.querySelectorAll('.demo-list li').forEach(li => li.classList.remove('active'));
            document.getElementById(`demo-${demoId}`).classList.add('active');

            clearContent();
            currentDemo = demo.id;

            if (demo.type === 'cubeboy-3d' || demo.type === 'cubeboy-nquad') {
                setupCubeboyDemo(demo);
            } else if (demo.type === 'lineboy') {
                setupLineboyDemo(demo);
            }
        }

        function setupCubeboyDemo(demo) {
            const container = document.getElementById('demoContainer');
            
            const canvas = document.createElement('canvas');
            canvas.id = 'canvas';
            canvas.width = 512;
            canvas.height = 512;

            const status = document.createElement('div');
            status.className = 'status';
            status.innerHTML = `
                <div style="font-weight: bold;">${demo.name}</div>
                <div>${demo.description}</div>
                <div style="margin-top: 8px; font-size: 11px;">
                    Controls: ← → = Rotate Y axis | ↑ / Space = Rotate X axis
                </div>
            `;

            container.appendChild(canvas);
            container.appendChild(status);

            // Import cubeboy module
            import('./examples/cubeboy.js').then(module => {
                module.init();

                const keys = { left: false, right: false, jump: false };

                const keyHandler = (e, state) => {
                    if (e.key === 'ArrowLeft') keys.left = state;
                    if (e.key === 'ArrowRight') keys.right = state;
                    if (e.key === ' ' || e.key === 'ArrowUp') keys.jump = state;
                    if (state && (e.key === ' ' || e.key === 'ArrowUp')) e.preventDefault();
                };

                window.addEventListener('keydown', (e) => keyHandler(e, true));
                window.addEventListener('keyup', (e) => keyHandler(e, false));

                const ctx = canvas.getContext('2d');
                const palette = new Uint32Array([
                    0xFF000000, 0xFF000080, 0xFF800080, 0xFF008000,
                    0xFF804000, 0xFF808080, 0xFFC0C0C0, 0xFFFFFFFF,
                    0xFFFF0000, 0xFFFF8000, 0xFFFFFF00, 0xFF00FF00,
                    0xFF00FFFF, 0xFF808080, 0xFFFF80FF, 0xFFFFAAAA
                ]);

                gameRunning = true;

                function animate() {
                    if (!gameRunning) return;
                    
                    module.update(keys.left, keys.right, keys.jump);
                    module.render();
                    const fb = module.get_framebuffer();
                    
                    const imageData = ctx.createImageData(512, 512);
                    const data = imageData.data;
                    
                    for (let i = 0; i < fb.length; i++) {
                        const color = palette[fb[i]];
                        data[i * 4] = (color >> 16) & 0xFF;
                        data[i * 4 + 1] = (color >> 8) & 0xFF;
                        data[i * 4 + 2] = color & 0xFF;
                        data[i * 4 + 3] = 0xFF;
                    }
                    
                    ctx.putImageData(imageData, 0, 0);
                    requestAnimationFrame(animate);
                }

                animate();
            }).catch(err => {
                status.innerHTML += `<div class="bad">❌ Error loading WASM: ${err.message}</div>`;
            });
        }

        function setupLineboyDemo(demo) {
            const container = document.getElementById('demoContainer');
            
            const canvas = document.createElement('canvas');
            canvas.id = 'canvas';
            canvas.width = 512;
            canvas.height = 512;

            const controls = document.createElement('div');
            controls.className = 'controls';
            controls.innerHTML = `
                <div><strong>${demo.name}</strong></div>
                <div style="margin: 8px 0; font-size: 11px;">${demo.description}</div>
                <div class="touch-controls">
                    <button id="btn-left" class="touch-btn">← Left</button>
                    <button id="btn-right" class="touch-btn">Right →</button>
                    <button id="btn-jump" class="touch-btn jump">JUMP ↑</button>
                    <button id="btn-reset" class="touch-btn" style="background: #f0f; color: #000;">Reset</button>
                </div>
            `;

            const status = document.createElement('div');
            status.className = 'status';
            status.innerHTML = `
                <div class="status-item">WASM Status: <span id="wasm-status">Loading...</span></div>
                <div class="status-item">Game Status: <span id="game-status">Initializing...</span></div>
                <div class="status-item">Frame: <span id="frame-count">0</span></div>
                <div id="debug-log"></div>
            `;

            container.appendChild(canvas);
            container.appendChild(controls);
            container.appendChild(status);

            // Setup button handlers and game
            setupLineboy(canvas, status);
        }

        async function setupLineboy(canvas, status) {
            const ctx = canvas.getContext('2d');
            let gameRunning = false;
            let frameCount = 0;

            const palette = [
                [0,0,0,255],           // 0: Black
                [29,43,83,255],        // 1: Navy
                [126,37,83,255],       // 2: Purple
                [0,135,81,255],        // 3: Green
                [171,82,54,255],       // 4: Brown
                [95,87,79,255],        // 5: Dark Gray
                [194,195,199,255],     // 6: Light Gray
                [255,241,232,255],     // 7: White
                [255,0,77,255],        // 8: Red
                [255,163,0,255],       // 9: Orange
                [255,240,0,255],       // 10: Yellow
                [0,231,86,255],        // 11: Lime
                [41,173,255,255],      // 12: Cyan
                [131,118,156,255],     // 13: Gray
                [255,119,168,255],     // 14: Pink
                [255,204,170,255]      // 15: Peach
            ];

            function addLog(msg) {
                const log = document.getElementById('debug-log');
                log.textContent += msg + '\n';
                log.scrollTop = log.scrollHeight;
            }

            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ') e.preventDefault();
            });
            window.addEventListener('keyup', (e) => {
                keys[e.key.toLowerCase()] = false;
            });

            // Touch buttons
            document.getElementById('btn-left').addEventListener('mousedown', () => keys['arrowleft'] = true);
            document.getElementById('btn-left').addEventListener('mouseup', () => keys['arrowleft'] = false);
            document.getElementById('btn-left').addEventListener('touchstart', (e) => { keys['arrowleft'] = true; e.preventDefault(); });
            document.getElementById('btn-left').addEventListener('touchend', (e) => { keys['arrowleft'] = false; e.preventDefault(); });

            document.getElementById('btn-right').addEventListener('mousedown', () => keys['arrowright'] = true);
            document.getElementById('btn-right').addEventListener('mouseup', () => keys['arrowright'] = false);
            document.getElementById('btn-right').addEventListener('touchstart', (e) => { keys['arrowright'] = true; e.preventDefault(); });
            document.getElementById('btn-right').addEventListener('touchend', (e) => { keys['arrowright'] = false; e.preventDefault(); });

            document.getElementById('btn-jump').addEventListener('mousedown', () => keys[' '] = true);
            document.getElementById('btn-jump').addEventListener('mouseup', () => keys[' '] = false);
            document.getElementById('btn-jump').addEventListener('touchstart', (e) => { keys[' '] = true; e.preventDefault(); });
            document.getElementById('btn-jump').addEventListener('touchend', (e) => { keys[' '] = false; e.preventDefault(); });

            document.getElementById('btn-reset').addEventListener('click', () => {
                if (lineboy && gameRunning) {
                    lineboy.init();
                    addLog('🔄 Game reset');
                }
            });

            // Load WASM
            try {
                addLog('⏳ Loading WASM module...');
                const wasmPath = './examples/lineboy_bg.wasm';
                const response = await fetch(wasmPath);
                const buffer = await response.arrayBuffer();
                const { instance } = await WebAssembly.instantiate(buffer);
                const lineboy = instance.exports;
                
                addLog('✅ WASM loaded');
                document.getElementById('wasm-status').textContent = '✓ Loaded';
                document.getElementById('wasm-status').className = 'good';

                addLog('⏳ Initializing game...');
                lineboy.init();
                addLog('✅ Game initialized');
                document.getElementById('game-status').textContent = '✓ Ready';
                document.getElementById('game-status').className = 'good';

                gameRunning = true;

                // Game loop
                function gameLoop() {
                    if (!gameRunning) return;
                    
                    try {
                        const left = keys['arrowleft'] || keys['a'] || false;
                        const right = keys['arrowright'] || keys['d'] || false;
                        const jump = keys[' '] || false;

                        lineboy.update(left, right, jump);
                        lineboy.render();

                        const buffer = lineboy.get_framebuffer();

                        if (!buffer || buffer.length === 0) {
                            addLog('❌ ERROR: Buffer is null or empty!');
                            gameRunning = false;
                            return;
                        }

                        const imageData = ctx.createImageData(512, 512);
                        const data = imageData.data;
                        
                        for (let i = 0; i < buffer.length; i++) {
                            const [r, g, b, a] = palette[buffer[i]];
                            data[i * 4] = r;
                            data[i * 4 + 1] = g;
                            data[i * 4 + 2] = b;
                            data[i * 4 + 3] = a;
                        }
                        
                        ctx.putImageData(imageData, 0, 0);
                        frameCount++;
                        document.getElementById('frame-count').textContent = frameCount;

                    } catch (err) {
                        addLog('❌ ERROR in gameLoop: ' + err.message);
                        gameRunning = false;
                        return;
                    }

                    requestAnimationFrame(gameLoop);
                }

                gameLoop();

            } catch (err) {
                addLog('❌ FATAL: ' + err.message);
                document.getElementById('wasm-status').textContent = '✗ Error';
                document.getElementById('wasm-status').className = 'bad';
            }
        }

        // Initialize
        renderDemoList();
        loadDemo('cubeboy-3d');
    </script>
</body>
</html>
